---
name: "cellgeni/fetch10xmeta"
description: >
  Fetches and parses metadata for public 10x datasets from GEO (GSE*), ArrayExpress (E-MTAB*),
  or BioProject (PRJ*). Downloads raw metadata from SRA/ENA/BioStudies, resolves sample-to-run
  mappings, classifies each run by download type, and produces a merged links file.
keywords:
  - metadata
  - GEO
  - SRA
  - ENA
  - ArrayExpress
  - BioProject
  - 10x
  - single-cell
  - public data
tools:
  - collect_metadata.sh:
      description: "Downloads and parses GEO/ArrayExpress/BioProject metadata, resolving sample-to-run mappings."
      homepage: "https://github.com/cellgeni/nf-reprocessing-public-10x"
      licence:
        - "MIT"
input:
- - meta:
      type: "map"
      description: "Map with dataset-level metadata. Must contain key 'id' with the dataset accession.\ne.g. [ id:'GSE230685' ]\n"
  - sample_ids:
      type: "string"
      description: >
        Comma-separated sample accession IDs to restrict processing to
        (e.g. 'GSM7232572,GSM7232573', 'DRS408305,DRS408306').
        If empty or null, all samples in the dataset are used.
output:
  links:
  - - meta:
        type: "map"
        description: "Map with dataset-level metadata, passed through from input.\ne.g. [ id:'GSE230685' ]\n"
    - links.tsv:
        type: "file"
        description: "TSV file with per-run metadata and an appended sample_id column mapping each run back to its source sample accession."
        pattern: "links.tsv"
  list:
  - - meta:
        type: "map"
        description: "Map with dataset-level metadata, passed through from input.\ne.g. [ id:'GSE230685' ]\n"
    - "*.list":
        type: "file"
        description: "Accession list files produced during metadata collection (*.run.list, *.sample.list, *.project.list, etc.)."
        pattern: "*.list"
  tsv:
  - - meta:
        type: "map"
        description: "Map with dataset-level metadata, passed through from input.\ne.g. [ id:'GSE230685' ]\n"
    - "*.tsv":
        type: "file"
        description: "TSV files from the collection pipeline: raw SRA/ENA metadata, accession mapping (*.accessions.tsv), sample-run mapping (*.sample_x_run.tsv), and parsed run classification (*.parsed.tsv)."
        pattern: "*.tsv"
  txt:
  - - meta:
        type: "map"
        description: "Map with dataset-level metadata, passed through from input.\ne.g. [ id:'GSE230685' ]\n"
    - "*.txt":
        type: "file"
        description: "Optional SDRF/IDF plain-text files, present for ArrayExpress (E-MTAB*) datasets."
        pattern: "*.txt"
        optional: true
  soft:
  - - meta:
        type: "map"
        description: "Map with dataset-level metadata, passed through from input.\ne.g. [ id:'GSE230685' ]\n"
    - "*_family.soft":
        type: "file"
        description: "Optional GEO SOFT family file, present for GEO (GSE*) datasets."
        pattern: "*_family.soft"
        optional: true
  versions:
  - path: "versions.yml"
    type: "file"
    description: "YAML file recording the pipeline version used by this process."
authors:
  - "@aljes"
maintainers:
  - "@aljes"
version: "0.0.4"
license: "MIT"
