$schema: https://raw.githubusercontent.com/nextflow-io/schemas/refs/heads/main/module/v1/schema.json
name: cellgeni/fetch10xmeta
version: 0.0.4
description: >
  Fetches and parses metadata for public 10x datasets from GEO (GSE*), ArrayExpress (E-MTAB*),
  or BioProject (PRJ*). Downloads raw metadata from SRA/ENA/BioStudies, resolves sample-to-run
  mappings, classifies each run by download type, and produces a merged links file.
license: MIT
keywords:
  - metadata
  - GEO
  - SRA
  - ENA
  - ArrayExpress
  - BioProject
  - 10x
  - single-cell
  - public data
input:
- - name: meta
    type: map
    description: >
      Map with dataset-level metadata. Must contain key 'id' with the dataset accession.
      Supported prefixes: GSE* (GEO), E-MTAB* (ArrayExpress), PRJ* (BioProject/ENA).
  - name: sample_ids
    type: string
    description: >
      Comma-separated sample accession IDs to restrict processing to (e.g. 'GSM7232572,GSM7232573',
      'DRS408305,DRS408306'). If empty or null, all samples in the dataset are used.
output:
- - name: meta
    type: map
    description: Map with dataset-level metadata, passed through from input.
  - name: links
    type: file
    description: >
      TSV file (links.tsv) — the parsed per-run metadata with an additional sample_id column
      appended. Each row is one run; the final column maps it back to its source sample accession.
- - name: meta
    type: map
    description: Map with dataset-level metadata, passed through from input.
  - name: list
    type: file
    description: >
      One or more list files (*.list) produced during metadata collection, including the run list
      (*.run.list) and intermediate accession lists (*.sample.list, *.project.list, etc.).
- - name: meta
    type: map
    description: Map with dataset-level metadata, passed through from input.
  - name: tsv
    type: file
    description: >
      TSV files (*.tsv) produced during metadata collection: raw SRA/ENA metadata
      (*.sra.tsv / *.ena.tsv), accession mapping (*.accessions.tsv), sample-run mapping
      (*.sample_x_run.tsv), and parsed per-run classification (*.parsed.tsv).
- - name: meta
    type: map
    description: Map with dataset-level metadata, passed through from input.
  - name: txt
    type: file
    description: Optional plain-text metadata files (*.txt), present for ArrayExpress datasets (SDRF/IDF).
    optional: true
- - name: meta
    type: map
    description: Map with dataset-level metadata, passed through from input.
  - name: soft
    type: file
    description: Optional GEO SOFT format file (*_family.soft), present for GEO (GSE*) datasets.
    optional: true
- name: versions
  type: file
  description: YAML file recording the pipeline version used by this process.
